<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06060e" />

    <!-- Primary meta -->
    <title>NexaFlow – The Operating System for High-Performance Teams</title>
    <meta
      name="description"
      content="NexaFlow unifies your workflows, automates busywork with AI, and gives your team superpowers — without the complexity. Start free, no credit card required."
    />
    <link rel="canonical" href="https://nexa-flow.vercel.app/" />

    <!-- Icons & manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NexaFlow" />
    <meta
      property="og:title"
      content="NexaFlow – The Operating System for High-Performance Teams"
    />
    <meta
      property="og:description"
      content="Unify workflows, automate busywork with AI, and ship faster. Trusted by 12,000+ teams."
    />
    <meta property="og:url" content="https://nexa-flow.vercel.app/" />
    <meta property="og:image" content="https://nexa-flow.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="NexaFlow – The Operating System for High-Performance Teams"
    />
    <meta
      name="twitter:description"
      content="Unify workflows, automate busywork with AI, and ship faster. Trusted by 12,000+ teams."
    />
    <meta name="twitter:image" content="https://nexa-flow.vercel.app/og-image.png" />

    <!-- Fonts: preconnect to cut render-blocking latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "NexaFlow",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "The operating system for high-performance teams. Unify workflows, automate busywork with AI, and ship faster.",
        "url": "https://nexa-flow.vercel.app/",
        "offers": {
          "@type": "AggregateOffer",
          "lowPrice": "29",
          "highPrice": "89",
          "priceCurrency": "USD"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "ratingCount": "1200"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      NexaFlow requires JavaScript. Please enable it to continue.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
